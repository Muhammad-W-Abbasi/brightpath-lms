spring.datasource.url=jdbc:h2:mem:lmsdb;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.flyway.enabled=true

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174
app.join-code.pepper=dev-pepper
app.jwt.secret=${APP_JWT_SECRET:dev-secret-change-me}
app.jwt.expiration-seconds=3600
