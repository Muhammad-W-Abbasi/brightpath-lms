spring.datasource.url=jdbc:h2:mem:lmsdb;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.flyway.enabled=true

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174
app.join-code.pepper=dev-pepper
# Development placeholder JWT secret (38 bytes, passes 32-byte minimum validation).
# Production must supply APP_JWT_SECRET via environment variable.
app.jwt.secret=${APP_JWT_SECRET:ZGV2LXNlY3JldC1wbGFjZWhvbGRlci1mb3ItZGV2ZWxvcG1lbnQ=}
app.jwt.expiration-seconds=3600
