name: Security Scan

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: brightpath-lms
          path: backend
          format: HTML

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: cd brightpath-frontend && npm ci && npm audit --audit-level=high
